<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | Nextgen Digital Leads</title>
    <meta name="robots" content="noindex" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #07110b;
        --panel: rgba(8, 20, 15, 0.95);
        --text: #f3f7f4;
        --muted: #aebfb5;
        --accent: #2ecc71;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, Arial, sans-serif;
        background: radial-gradient(circle at top, #123621 0%, var(--bg) 70%);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(100%, 560px);
        background: var(--panel);
        border: 1px solid rgba(46, 204, 113, 0.25);
        border-radius: 20px;
        padding: 32px;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
        text-align: center;
      }
      h1 { margin: 0 0 12px; font-size: 2rem; }
      p { margin: 0 0 20px; color: var(--muted); line-height: 1.6; }
      a {
        display: inline-block;
        padding: 12px 18px;
        text-decoration: none;
        color: #07110b;
        background: var(--accent);
        border-radius: 999px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Page Not Found</h1>
      <p>The page you requested could not be found. We are checking for the correct version of this page now.</p>
      <a href="/">Return to the homepage</a>
    </div>

    <script>
      (async function () {
        const currentPath = window.location.pathname.replace(/\/+$/, "");

        if (!currentPath || currentPath === "") {
          return;
        }

        if (currentPath.endsWith(".html")) {
          return;
        }

        const candidates = [
          `${currentPath}.html`,
          `${currentPath}/`,
          `${currentPath}/index.html`
        ];

        for (const candidate of candidates) {
          try {
            const response = await fetch(candidate, { method: "GET" });
            if (response.ok) {
              window.location.replace(candidate);
              return;
            }
          } catch (error) {
            // Ignore and continue to the next candidate.
          }
        }
      })();
    </script>
  </body>
</html>
